<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Neon Pen</title>
    <link rel="stylesheet" href="/sketches/neon-pen/neon-pen.css" />
    <link rel="icon" href="../h.png" type="image/png" sizes="16x16" />
    <script
      type="text/javascript"
      src="https://cdnjs.cloudflare.com/ajax/libs/paper.js/0.11.5/paper-full.min.js"
    ></script>
    <script type="text/paperscript" canvas="canvas">
      tool.minDistance = 5;
      tool.maxDistance = 100;
      var path;

      function onMouseDown(event){
        path = new Path();
        path.fillColor = {
          hue: Math.random() * 360,
          saturation: 1,
          brightness: 1
        };
        path.add(event.point);
      }

      function onMouseDrag(event) {
        var motion = event.delta/2;
        motion.angle += 45;
        var top = event.middlePoint + motion;
        var bottom = event.middlePoint - motion;
        path.add(top);
        path.insert(0,bottom);
        path.smooth();
        var dot = new Path.RegularPolygon({
          center: event.middlePoint,
          sides: 8,
          radius: event.delta.length/2
        });
        dot.fillColor = {
          hue: Math.random() * 360,
          saturation: 1,
          brightness: 1
        };
        dot.opacity = 0.4;
      }

        function onMouseUp(event) {
          path.add(event.point);
          path.closed = true;
          path.smooth();
        }
    </script>
  </head>

  <body>
    <canvas id="canvas" resize></canvas>
  </body>
</html>
